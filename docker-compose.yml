services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8098:8098"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-web
      - portal-web
      - api
    networks:
      - arofi-net

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-arofi_dev}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-arofi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arofi-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arofi-net

  freeradius:
    image: freeradius/freeradius-server:latest-alpine
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./config/freeradius/clients.conf:/etc/raddb/clients.conf:ro
      - ./config/freeradius/mods-config/files/authorize:/etc/raddb/mods-config/files/authorize:ro
    networks:
      - arofi-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@postgres:5432/${POSTGRES_DB:-arofi_dev}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - NODE_ENV=production
      - PAYMENT_DEFAULT_PROVIDER=${PAYMENT_DEFAULT_PROVIDER:-PESAPAL}
      - YO_API_MODE=${YO_API_MODE:-live}
      - YO_API_BASE_URL=${YO_API_BASE_URL:-https://paymentsapi1.yo.co.ug/ybs/task.php}
      - YO_API_FALLBACK_URL=${YO_API_FALLBACK_URL:-https://paymentsapi2.yo.co.ug/ybs/task.php}
      - YO_API_USERNAME=${YO_API_USERNAME:-}
      - YO_API_PASSWORD=${YO_API_PASSWORD:-}
      - YO_WEBHOOK_BASE_URL=${YO_WEBHOOK_BASE_URL:-https://arofi.arosoft.io/api/payments/webhooks/yo-uganda}
      - YO_WEBHOOK_TOKEN=${YO_WEBHOOK_TOKEN:-change_me_yo_webhook}
      - PESAPAL_MODE=${PESAPAL_MODE:-live}
      - PESAPAL_BASE_URL=${PESAPAL_BASE_URL:-}
      - PESAPAL_CONSUMER_KEY=${PESAPAL_CONSUMER_KEY:-}
      - PESAPAL_CONSUMER_SECRET=${PESAPAL_CONSUMER_SECRET:-}
      - PESAPAL_IPN_ID=${PESAPAL_IPN_ID:-}
      - PESAPAL_CALLBACK_URL=${PESAPAL_CALLBACK_URL:-https://arofi.arosoft.io/api/payments/webhooks/pesapal}
      - PESAPAL_WEBHOOK_TOKEN=${PESAPAL_WEBHOOK_TOKEN:-change_me_pesapal_webhook}
      - ROUTER_CREDENTIAL_SECRET=${ROUTER_CREDENTIAL_SECRET:-change_this_router_secret}
      - RADIUS_SERVER_HOST=${RADIUS_SERVER_HOST:-freeradius}
      - RADIUS_PUBLIC_HOST=${RADIUS_PUBLIC_HOST:-95.111.234.34}
      - RADIUS_AUTH_PORT=${RADIUS_AUTH_PORT:-1812}
      - RADIUS_ACCOUNTING_PORT=${RADIUS_ACCOUNTING_PORT:-1813}
      - RADIUS_SHARED_SECRET=${RADIUS_SHARED_SECRET:-radius-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arofi-net

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - API_SERVER_URL=http://api:3000/api
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    networks:
      - arofi-net

  portal-web:
    build:
      context: ./apps/portal-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - API_SERVER_URL=http://api:3000/api
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    networks:
      - arofi-net

networks:
  arofi-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
