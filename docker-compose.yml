services:
  nginx:
    image: nginx:alpine
    container_name: arofi-nginx
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-web
      - portal-web
      - api
    networks:
      - arofi-net

  postgres:
    image: postgres:15-alpine
    container_name: arofi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-arofi_dev}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - arofi-net

  redis:
    image: redis:7-alpine
    container_name: arofi-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - arofi-net

  freeradius:
    image: freeradius/freeradius-server:latest-alpine
    container_name: arofi-freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - arofi-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: arofi-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@postgres:5432/${POSTGRES_DB:-arofi_dev}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    networks:
      - arofi-net

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: arofi-admin
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    networks:
      - arofi-net

  portal-web:
    build:
      context: ./apps/portal-web
      dockerfile: Dockerfile
    container_name: arofi-portal
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    networks:
      - arofi-net

networks:
  arofi-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
