version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: arofi-nginx
    ports:
      - "8088:8088"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-web
      - portal-web
      - api
    networks:
      - arofi-net

  postgres:
    image: postgres:15-alpine
    container_name: arofi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-arofi_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - arofi-net

  redis:
    image: redis:7-alpine
    container_name: arofi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - arofi-net

  freeradius:
    image: freeradius/freeradius-server:latest-alpine
    container_name: arofi-freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - arofi-net
    # Currently dummy run. Integration will come later.

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: arofi-api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@postgres:5432/${POSTGRES_DB:-arofi_dev}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_for_dev_only
    depends_on:
      - postgres
      - redis
    networks:
      - arofi-net
    command: npm run start:dev
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: arofi-admin
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000/api
    networks:
      - arofi-net
    command: npm run dev
    volumes:
      - ./apps/admin-web:/app
      - /app/node_modules

  portal-web:
    build:
      context: ./apps/portal-web
      dockerfile: Dockerfile
    container_name: arofi-portal
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000/api
    networks:
      - arofi-net
    command: npm run dev
    volumes:
      - ./apps/portal-web:/app
      - /app/node_modules

networks:
  arofi-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
